name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            python:
              - '**/*.py'

  # 必需状态检查名为 "lint"。被 if 跳过的 job 不会产生通过状态，
  # 因此本 job 始终运行：有 Python 改动时执行真正的检查，
  # 无改动时立即成功，从而满足分支保护的 required check。
  lint:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip lint for non-Python changes
        if: ${{ needs.changes.outputs.python != 'true' }}
        run: echo "No Python changes detected — lint skipped, marking success."

      - name: Set up Python
        if: ${{ needs.changes.outputs.python == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: pip install ruff black

      - name: Ruff check
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: ruff check .

      - name: Black format check
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: black --check --line-length 100 .

  # 同样的 guard 逻辑：始终运行，无 Python 改动时直接成功，
  # 以防将来被设为分支保护的必需检查。
  typecheck:
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - name: Skip typecheck for non-Python changes
        if: ${{ needs.changes.outputs.python != 'true' }}
        run: echo "No Python changes detected — typecheck skipped, marking success."

      - name: Set up Python
        if: ${{ needs.changes.outputs.python == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps + pyright
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: pip install -r requirements.txt pyright

      - name: Pyright
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: pyright

  # 同样的 guard 逻辑：矩阵 job 始终运行（每条目都会快速成功），
  # 无 Python 改动时直接成功，以防将来被设为分支保护的必需检查。
  test:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    env:
      DEEPSEEK_API_KEY: sk-test-dummy
    steps:
      - name: Skip tests for non-Python changes
        if: ${{ needs.changes.outputs.python != 'true' }}
        run: echo "No Python changes detected — tests skipped, marking success."

      - name: Set up Python ${{ matrix.python-version }}
        if: ${{ needs.changes.outputs.python == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install deps
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: pip install -r requirements.txt

      - name: Run tests
        if: ${{ needs.changes.outputs.python == 'true' }}
        run: pytest tests/ -v --tb=short
