<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业报销智能化系统 — 登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=app_version) }}">
</head>
<body>

<div class="login-screen">
    <div class="login-card">
        <div class="login-logo">
            <h2>企业报销智能化系统</h2>
            <div class="login-sub">V1.5 多角色和多智能体协同工作台</div>
        </div>

        {% if error %}
        <div class="login-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
            <div class="form-section">
                <label class="form-label" for="loginRole">选择身份（5 角色）</label>
                <select id="loginRole" name="role" class="form-input" onchange="fillDemoAccount(this.value)">
                    <option value="employee"       {% if selected_role == 'employee'       %}selected{% endif %}>👤 员工</option>
                    <option value="approver"       {% if selected_role == 'approver'       %}selected{% endif %}>👔 主管</option>
                    <option value="finance_review" {% if selected_role == 'finance_review' %}selected{% endif %}>📋 财务</option>
                    <option value="finance_pay"    {% if selected_role == 'finance_pay'    %}selected{% endif %}>💰 出纳</option>
                    <option value="admin"          {% if selected_role == 'admin'          %}selected{% endif %}>⚙️ 系统管理员</option>
                </select>
            </div>

            <div class="form-section">
                <label class="form-label" for="loginAccount">工号 / 账号</label>
                <input type="text" id="loginAccount" name="account" class="form-input"
                       value="{{ account or 'EMP-2026' }}" placeholder="请输入工号"
                       oninput="syncRoleFromAccount(this.value)" required>
            </div>
            <div class="form-section">
                <label class="form-label" for="loginPassword">密码</label>
                <input type="password" id="loginPassword" name="password" class="form-input"
                       value="123456" placeholder="请输入密码" required>
            </div>

            <button type="submit" class="btn-login">🔓 登 录</button>
        </form>

        <div class="login-hint">
            <strong>演示账号：</strong><br>
            员工 <code>EMP-2026</code> · 主管 <code>APR-001</code><br>
            财务 <code>FIN-001</code> · 出纳 <code>FIN-002</code><br>
            系统管理员 <code>ADM-001</code><br>
            （密码：123456）
        </div>
    </div>
</div>

<script>
/* 切换角色时自动填充演示账号 */
function fillDemoAccount(role) {
    var accounts = {
        'employee': 'EMP-2026',
        'approver': 'APR-001',
        'finance_review': 'FIN-001',
        'finance_pay': 'FIN-002',
        'admin': 'ADM-001'
    };
    document.getElementById('loginAccount').value = accounts[role] || 'EMP-2026';
}

/* 输入工号时自动同步角色下拉框（反向联动） */
function syncRoleFromAccount(account) {
    var roleByAccount = {
        'EMP-2026': 'employee',
        'APR-001': 'approver',
        'FIN-001': 'finance_review',
        'FIN-002': 'finance_pay',
        'ADM-001': 'admin'
    };
    var role = roleByAccount[(account || '').trim().toUpperCase()];
    if (role) {
        document.getElementById('loginRole').value = role;
    }
}
</script>
</body>
</html>
